services:
  db:
    image: postgres:16-alpine
    container_name: biblioteca_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: biblioteca
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d biblioteca"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: biblioteca_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 5001
      DATABASE_URL: "postgresql://postgres:root@db:5432/biblioteca?schema=public"
      JWT_SECRET: "super_secret_jwt_access_key_12345_for_library_management_system"
      JWT_REFRESH_SECRET: "super_secret_jwt_refresh_key_67890_for_library_management_system"
      JWT_EXPIRES_IN: "15m"
      JWT_REFRESH_EXPIRES_IN: "7d"
      NODE_ENV: "production"
    ports:
      - "5001:5001"

volumes:
  postgres_data:
